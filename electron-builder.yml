appId: com.kaizen.crm
productName: Kaizen CRM
directories:
  app: desktop
  output: dist-desktop
  buildResources: build
# The Electron shell needs only main.js — the Next server ships its own
# node_modules inside extraResources/server.
files:
  - main.js
  - package.json
  - "!**/node_modules/**"
npmRebuild: false
extraResources:
  - from: .next/standalone
    to: server
    filter:
      - "**/*"
      - "!.kaizen/**"
  # electron-builder's default filter skips node_modules — copy it explicitly.
  - from: .next/standalone/node_modules
    to: server/node_modules
  - from: .next/static
    to: server/.next/static
  - from: public
    to: server/public
  - from: db/migrations
    to: server/db/migrations
win:
  target:
    - portable
    - nsis
  icon: build/icon.ico
nsis:
  oneClick: true
  deleteAppDataOnUninstall: false
portable:
  artifactName: ${productName}-${version}-portable.exe
