name: Cron (automations)

# Vercel's Hobby plan only runs cron jobs once per day, so this workflow
# provides the every-15-minutes trigger instead: it hits /api/cron on your
# deployed instance and the AutomationService decides what is actually due.
# Requires the KAIZEN_APP_URL repository variable (skips politely without
# it) and, if you set CRON_SECRET on Vercel, a matching CRON_SECRET repo
# secret. Note GitHub disables scheduled workflows after 60 days without
# repo activity — a single click in the Actions tab re-enables them.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ vars.KAIZEN_APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Hit /api/cron
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::notice::KAIZEN_APP_URL repository variable not set — skipping."
            exit 0
          fi
          curl --fail-with-body -sS -m 290 \
            ${CRON_SECRET:+-H "Authorization: Bearer $CRON_SECRET"} \
            "${APP_URL%/}/api/cron"
