name: Build Android APK

# The APK is a thin native shell that loads your deployed Kaizen instance.
# Deploy the app first (e.g. Vercel), then run this workflow with that URL.
on:
  workflow_dispatch:
    inputs:
      app_url:
        description: "URL of your deployed Kaizen instance (https://…)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KAIZEN_APP_URL: ${{ inputs.app_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor config (bakes the app URL into the shell)
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kaizen-crm-android
          path: android/app/build/outputs/apk/debug/app-debug.apk
